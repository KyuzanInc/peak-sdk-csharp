name: C# CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: csharp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build+test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      TurnkeySourceProject: ${{ github.workspace }}/.artifacts/turnkey-source/src/turnkey-sdk-csharp.csproj
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: 8.0.x

      - name: Prepare pinned Turnkey 1.0.0 source and local feed
        shell: bash
        run: >-
          ./tools/compatibility/prepare-turnkey-local-feed.sh
          .artifacts/turnkey-feed .artifacts/turnkey-source

      - name: Restore against pinned public Turnkey source
        shell: bash
        run: >-
          dotnet restore peak-sdk-csharp.sln --force-evaluate
          --configfile nuget.public-ci.config

      - name: Build
        run: dotnet build peak-sdk-csharp.sln --no-restore -c Release

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: >-
          dotnet format peak-sdk-csharp.sln --verify-no-changes --no-restore
          --exclude packages/peak-public-api-client-csharp/
          .artifacts/turnkey-source/

      - name: Test (unit, no E2E)
        shell: bash
        run: |
          dotnet test peak-sdk-csharp.sln --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "Category!=E2E"

      - name: Verify public-source and package regressions
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          bash tools/tests/verify-action-pins-test.sh
          bash tools/verify-action-pins.sh
          bash tools/publication/tests/verify-public-tree-test.sh
          bash tools/publication/tests/verify-docs-test.sh
          bash tools/package/tests/verify-version-contract-test.sh
          bash tools/compatibility/tests/prepare-turnkey-local-feed-test.sh
          bash tools/package/tests/validate-package-test.sh
          bash tools/package/tests/canonicalize-nuget-package-test.sh
          bash tools/publication/tests/verify-workflows-test.sh
          bash tools/publication/verify-actions-schema.sh

      - name: Verify public-source and workflow policy
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          bash tools/publication/verify-public-tree.sh
          bash tools/publication/verify-docs.sh
          bash tools/package/verify-version-contract.sh
          bash tools/publication/verify-workflows.sh

      - name: Pack and validate Peak 1.0.0
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p .artifacts/peak-feed
          TurnkeySourceProject= dotnet restore \
            packages/peak-sdk-csharp/src/peak-sdk-csharp.csproj \
            --force-evaluate --configfile nuget.public-ci.config \
            -p:NuGetLockFilePath="$PWD/.artifacts/peak-pack.packages.lock.json"
          TurnkeySourceProject= dotnet pack \
            packages/peak-sdk-csharp/src/peak-sdk-csharp.csproj \
            -c Release --no-build --no-restore -p:RepositoryBranch= \
            -o .artifacts/peak-feed
          python3 tools/package/canonicalize-nuget-package.py \
            .artifacts/peak-feed/KyuzanInc.Peak.Sdk.1.0.0.nupkg
          python3 tools/package/canonicalize-nuget-package.py \
            .artifacts/peak-feed/KyuzanInc.Peak.Sdk.1.0.0.snupkg
          bash tools/package/validate-package.sh \
            .artifacts/peak-feed/KyuzanInc.Peak.Sdk.1.0.0.nupkg \
            .artifacts/peak-feed/KyuzanInc.Peak.Sdk.1.0.0.snupkg

      - name: Validate local consumers
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          bash tools/package/consumer-smoke.sh \
            .artifacts/peak-feed .artifacts/turnkey-feed netstandard2.1
          bash tools/package/consumer-smoke.sh \
            .artifacts/peak-feed .artifacts/turnkey-feed net8.0

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml

  consumer-restore-check:
    name: consumer restore (${{ matrix.tfm }})
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        tfm: [netstandard2.1, net8.0]
    env:
      TurnkeySourceProject: ${{ github.workspace }}/.artifacts/turnkey-source/src/turnkey-sdk-csharp.csproj
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: 8.0.x

      - name: Prepare pinned Turnkey 1.0.0 source and local feed
        shell: bash
        run: >-
          ./tools/compatibility/prepare-turnkey-local-feed.sh
          .artifacts/turnkey-feed .artifacts/turnkey-source

      - name: Restore against pinned public Turnkey source
        shell: bash
        run: >-
          dotnet restore peak-sdk-csharp.sln --force-evaluate
          --configfile nuget.public-ci.config

      - name: Build and pack Peak 1.0.0
        shell: bash
        run: |
          dotnet build peak-sdk-csharp.sln --no-restore -c Release
          mkdir -p .artifacts/peak-feed
          TurnkeySourceProject= dotnet restore \
            packages/peak-sdk-csharp/src/peak-sdk-csharp.csproj \
            --force-evaluate --configfile nuget.public-ci.config \
            -p:NuGetLockFilePath="$PWD/.artifacts/peak-pack.packages.lock.json"
          TurnkeySourceProject= dotnet pack \
            packages/peak-sdk-csharp/src/peak-sdk-csharp.csproj \
            -c Release --no-build --no-restore -p:RepositoryBranch= \
            -o .artifacts/peak-feed

      - name: Validate local consumer
        shell: bash
        run: >-
          bash tools/package/consumer-smoke.sh
          .artifacts/peak-feed .artifacts/turnkey-feed ${{ matrix.tfm }}

  openapi-client-drift:
    name: openapi client drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup JRE (openapi-generator runs on Java)
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '22'

      - name: Audit pinned OpenAPI codegen dependencies
        run: >-
          npm --prefix packages/peak-public-api-client-csharp audit
          --package-lock-only --audit-level=moderate

      - name: Regenerate the C# client from the pinned spec
        run: ./scripts/generate-public-api-client.sh

      - name: Fail if the committed client drifted from the spec
        shell: bash
        run: |
          git add -A -- \
            packages/peak-public-api-client-csharp/src \
            packages/peak-public-api-client-csharp/.openapi-generator
          if ! git diff --cached --quiet -- \
              packages/peak-public-api-client-csharp/src \
              packages/peak-public-api-client-csharp/.openapi-generator; then
            echo "::error::Generated client is out of sync with the pinned spec."
            git --no-pager diff --cached --stat -- \
              packages/peak-public-api-client-csharp/src \
              packages/peak-public-api-client-csharp/.openapi-generator
            exit 1
          fi
          echo "No drift."
