name: C# CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: csharp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build+test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Authenticate GitHub Packages NuGet source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The `github-kyuzan` source itself is already declared in
          # the repo's nuget.config, so we use `update source` (not
          # `add source`) to attach credentials. `add source` would
          # exit with a duplicate-source error here.
          # KyuzanInc.Turnkey.Sdk ships from GitHub Packages until it
          # lives on nuget.org. The username can be any non-empty
          # string when authenticating with GITHUB_TOKEN; we pin it to
          # the bot identity so restore logs are easy to audit.
          dotnet nuget update source github-kyuzan \
            --source https://nuget.pkg.github.com/KyuzanInc/index.json \
            --username takeshijuan \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text

      - name: Restore
        shell: bash
        # TODO(M11 follow-up): switch to `--locked-mode` once
        # packages.lock.json files are generated and committed.
        # First run cannot use --locked-mode because the lock files do
        # not exist yet and the local restore needed to bootstrap them
        # requires a PAT with read:packages, which the user has to
        # configure once.
        run: dotnet restore peak-sdk-csharp.sln

      - name: Build
        run: dotnet build peak-sdk-csharp.sln --no-restore -c Release

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format peak-sdk-csharp.sln --verify-no-changes --no-restore

      - name: Test (unit, no E2E)
        shell: bash
        env:
          TURNKEY_TEST_ORG_API_KEY: ${{ secrets.TURNKEY_TEST_ORG_API_KEY }}
          TURNKEY_TEST_ORG_ID: ${{ secrets.TURNKEY_TEST_ORG_ID }}
        run: |
          dotnet test peak-sdk-csharp.sln --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "Category!=E2E"

      - name: Test (E2E, ubuntu only, when secrets present)
        if: matrix.os == 'ubuntu-latest' && env.TURNKEY_TEST_ORG_API_KEY != ''
        shell: bash
        env:
          TURNKEY_TEST_ORG_API_KEY: ${{ secrets.TURNKEY_TEST_ORG_API_KEY }}
          TURNKEY_TEST_ORG_ID: ${{ secrets.TURNKEY_TEST_ORG_ID }}
        run: |
          dotnet test peak-sdk-csharp.sln --no-build -c Release \
            --filter "Category=E2E"

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml

  consumer-restore-check:
    name: consumer restore (${{ matrix.tfm }})
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        tfm: [netstandard2.1, net8.0]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Authenticate GitHub Packages NuGet source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `github-kyuzan` is already declared in the repo nuget.config;
          # update (don't add) attaches credentials.
          dotnet nuget update source github-kyuzan \
            --source https://nuget.pkg.github.com/KyuzanInc/index.json \
            --username takeshijuan \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text
      - name: Restore + Pack KyuzanInc.Peak.Sdk
        shell: bash
        # TODO(M11 follow-up): add --locked-mode after lock files land.
        run: |
          dotnet restore peak-sdk-csharp.sln
          dotnet pack packages/peak-sdk-csharp/src/peak-sdk-csharp.csproj \
            --no-restore -c Release -o ./local-feed
      - name: Smoke consumer project that references the .nupkg
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/consumer && cd /tmp/consumer
          cat > consumer.csproj <<EOF
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>${{ matrix.tfm }}</TargetFramework>
              <Nullable>enable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="KyuzanInc.Peak.Sdk" Version="0.1.0-alpha.0" />
            </ItemGroup>
          </Project>
          EOF
          cat > Program.cs <<'EOF'
          using KyuzanInc.Peak.Sdk;
          public static class Program {
              public static void Main() {
                  // PeakClient has a private constructor; the only
                  // entry point is the static Initialize() factory.
                  // Use a throwaway options object — we only need to
                  // verify the consumer compiles + restores.
                  var _ = PeakClient.Initialize(new PeakClientOptions
                  {
                      ApiUrl        = "https://example.invalid/",
                      ProjectApiKey = "key",
                  });
                  System.Console.WriteLine("ok");
              }
          }
          EOF
          # nuget.config: pin local feed, allow GitHub Packages for
          # the transitive KyuzanInc.Turnkey.Sdk pull, and let
          # nuget.org cover everything else.
          cat > nuget.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="github-kyuzan" value="https://nuget.pkg.github.com/KyuzanInc/index.json" />
              <add key="local" value="${GITHUB_WORKSPACE}/local-feed" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="nuget.org">
                <package pattern="*" />
              </packageSource>
              <packageSource key="github-kyuzan">
                <package pattern="KyuzanInc.Turnkey.*" />
              </packageSource>
              <packageSource key="local">
                <package pattern="KyuzanInc.Peak.*" />
              </packageSource>
            </packageSourceMapping>
            <packageSourceCredentials>
              <github-kyuzan>
                <add key="Username" value="takeshijuan" />
                <add key="ClearTextPassword" value="${GITHUB_TOKEN}" />
              </github-kyuzan>
            </packageSourceCredentials>
          </configuration>
          EOF
          dotnet restore consumer.csproj
          # Build too: restore alone leaves PeakClient unverified, so a
          # bad ProjectReference + missing constructor would still pass.
          dotnet build consumer.csproj --no-restore -c Release
