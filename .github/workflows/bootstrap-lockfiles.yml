name: Bootstrap lock files (one-shot)

# Temporary workflow used once to generate packages.lock.json against the
# currently-published KyuzanInc.Turnkey.Sdk on GitHub Packages. The
# maintainer's local gh token lacks read:packages, but the CI
# GITHUB_TOKEN has it via the package's Manage Actions access grant.
# This runs on push to the chore/m11-lockfiles branch, restores, and
# uploads the lock files as an artifact for the maintainer to commit.
# DELETE this workflow in the same PR that lands the lock files.

on:
  push:
    branches: [chore/m11-lockfiles]

permissions:
  contents: read
  packages: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Authenticate GitHub Packages NuGet source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget update source github-kyuzan \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text

      - name: Restore (generates packages.lock.json)
        shell: bash
        run: dotnet restore peak-sdk-csharp.sln

      - name: Upload lock files
        uses: actions/upload-artifact@v4
        with:
          name: lockfiles
          path: packages/peak-sdk-csharp/**/packages.lock.json
          if-no-files-found: error
