name: Consumer install smoke

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Exact published package version to verify
        required: true
        default: 1.0.1
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read

jobs:
  consumer:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.name == 'Release' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: github-packages-read
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE: true
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - name: Initialize isolated consumer paths
        id: initialize-paths
        shell: bash
        env:
          RUNNER_TEMP_ROOT: ${{ runner.temp }}
        run: |
          set -euo pipefail
          umask 077
          consumer_root="$RUNNER_TEMP_ROOT/peak-consumer"
          {
            printf 'CONSUMER_ROOT=%s\n' "$consumer_root"
            printf 'CONSUMER_PROJECT=%s\n' "$consumer_root/PeakSdkConsumer"
            printf 'DOTNET_CLI_HOME=%s\n' "$consumer_root/.dotnet"
            printf 'NUGET_HTTP_CACHE_PATH=%s\n' "$consumer_root/.nuget/http-cache"
            printf 'NUGET_PACKAGES=%s\n' "$consumer_root/.nuget/packages"
            printf 'NUGET_PLUGINS_CACHE_PATH=%s\n' "$consumer_root/.nuget/plugins-cache"
            printf 'NUGET_CONFIG=%s\n' "$consumer_root/NuGet.Config"
          } >> "$GITHUB_ENV"

      - name: Check out the consumer workflow revision
        id: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up .NET
        id: setup-dotnet
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: 8.0.x

      - name: Validate trigger, version, and live visibility
        id: preflight
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ inputs.package_version }}
          WORKFLOW_RUN_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          EXPECTED_VERSION: 1.0.1
        run: |
          set -euo pipefail

          visibility="$(gh api "repos/$REPOSITORY" --jq '.visibility')"
          case "$visibility" in
            private|public|internal) ;;
            *) printf '%s\n' 'Unexpected repository visibility' >&2; exit 1 ;;
          esac

          case "$EVENT_NAME" in
            workflow_dispatch)
              [[ "$DISPATCH_VERSION" == "$EXPECTED_VERSION" ]] || {
                echo "::error::Only exact package version 1.0.1 may be consumed"; exit 1;
              }
              ;;
            workflow_run)
              [[ "$WORKFLOW_RUN_NAME" == "Release" ]] || {
                echo "::error::Consumer smoke accepts only the Release workflow"; exit 1;
              }
              [[ "$WORKFLOW_RUN_CONCLUSION" == "success" ]] || {
                echo "::error::Consumer smoke requires a successful Release workflow"; exit 1;
              }
              ;;
            *) printf '%s\n' 'Unexpected workflow trigger' >&2; exit 1 ;;
          esac

          printf 'visibility=%s\n' "$visibility" >> "$GITHUB_OUTPUT"
          printf 'package_version=%s\n' "$EXPECTED_VERSION" >> "$GITHUB_OUTPUT"

      - name: Require dedicated read credentials
        id: dedicated-credential-check
        shell: bash
        env:
          NUGET_READ_USERNAME: ${{ secrets.NUGET_READ_USERNAME }}
          NUGET_READ_TOKEN: ${{ secrets.NUGET_READ_TOKEN }}
        run: |
          set -euo pipefail
          for variable in NUGET_READ_USERNAME NUGET_READ_TOKEN; do
            [[ -n "${!variable}" ]] || {
              echo "::error::A protected package read credential is unavailable"; exit 1;
            }
          done

      - name: Create the isolated exact-version consumer
        id: prepare-consumer
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          rm -rf "$CONSUMER_ROOT"
          mkdir -p "$CONSUMER_PROJECT" "$DOTNET_CLI_HOME" "$NUGET_PACKAGES"
          cat > "$CONSUMER_PROJECT/PeakSdkConsumer.csproj" <<'XML'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11</LangVersion>
              <Nullable>enable</Nullable>
              <ImplicitUsings>disable</ImplicitUsings>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="KyuzanInc.Peak.Sdk" Version="[1.0.1]" />
            </ItemGroup>
          </Project>
          XML
          cat > "$CONSUMER_PROJECT/Program.cs" <<'CS'
          using System;
          using KyuzanInc.Peak.Sdk;
          using KyuzanInc.Peak.Sdk.Storage;

          var storage = new InMemoryStorage();
          var client = PeakClient.Initialize(new PeakClientOptions
          {
              ApiUrl = "https://api.example.com",
              ProjectApiKey = "consumer-smoke",
              Storage = storage,
          });
          storage.Set("smoke-key", "smoke-value");
          if (client is null || storage.Get("smoke-key") != "smoke-value")
          {
              throw new InvalidOperationException("Peak consumer storage round-trip failed");
          }
          Console.WriteLine("Peak consumer storage round-trip passed");
          CS
          cat > "$NUGET_CONFIG" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="github-kyuzan" value="https://nuget.pkg.github.com/KyuzanInc/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="github-kyuzan">
                <package pattern="KyuzanInc.Peak.*" />
                <package pattern="KyuzanInc.Turnkey.*" />
              </packageSource>
              <packageSource key="nuget.org">
                <package pattern="BouncyCastle.*" />
                <package pattern="Microsoft.*" />
                <package pattern="NETStandard.Library" />
                <package pattern="System.*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          XML
          chmod 600 "$NUGET_CONFIG"

      - name: Configure dedicated read credentials
        id: configure-dedicated
        shell: bash
        env:
          NUGET_READ_USERNAME: ${{ secrets.NUGET_READ_USERNAME }}
          NUGET_READ_TOKEN: ${{ secrets.NUGET_READ_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          dotnet nuget update source github-kyuzan \
            --username "$NUGET_READ_USERNAME" \
            --password "$NUGET_READ_TOKEN" \
            --store-password-in-clear-text \
            --configfile "$NUGET_CONFIG"
          [[ "$(stat -c '%a' "$NUGET_CONFIG")" == 600 ]]

      - name: Restore the published package graph
        id: restore
        shell: bash
        run: |
          set -euo pipefail
          test -f "$NUGET_CONFIG"
          dotnet restore "$CONSUMER_PROJECT/PeakSdkConsumer.csproj" \
            --configfile "$NUGET_CONFIG" \
            --no-cache \
            --force-evaluate

      - name: Assert exact package identities and Peak source
        id: assert-package-graph
        shell: bash
        run: |
          set -euo pipefail
          assets="$CONSUMER_PROJECT/obj/project.assets.json"
          metadata="$NUGET_PACKAGES/kyuzaninc.peak.sdk/1.0.1/.nupkg.metadata"
          test -f "$assets"
          test -f "$metadata"
          jq -e '(.libraries | type == "object") and
            ([.libraries | keys[] | select((split("/")[0] | ascii_downcase) == "kyuzaninc.peak.sdk")] | length) == 1 and
            ([.libraries | keys[] | select((split("/")[0] | ascii_downcase) == "kyuzaninc.peak.sdk" and split("/")[1] == "1.0.1")] | length) == 1 and
            ([.libraries | keys[] | select((split("/")[0] | ascii_downcase) == "kyuzaninc.turnkey.sdk")] | length) == 1 and
            ([.libraries | keys[] | select((split("/")[0] | ascii_downcase) == "kyuzaninc.turnkey.sdk" and split("/")[1] == "1.0.0")] | length) == 1' "$assets"
          jq -e 'type == "object" and
            .source == "https://nuget.pkg.github.com/KyuzanInc/index.json"' "$metadata"

      - name: Remove package credentials
        id: cleanup-config
        if: always()
        shell: bash
        run: rm -f "$NUGET_CONFIG"

      - name: Build without package access
        id: build
        run: dotnet build "$CONSUMER_PROJECT/PeakSdkConsumer.csproj" -c Release --no-restore

      - name: Run the public API smoke without package access
        id: run
        run: dotnet run --project "$CONSUMER_PROJECT/PeakSdkConsumer.csproj" -c Release --no-build --no-restore
