name: C# NuGet Publish

on:
  push:
    tags:
      - 'v*'   # e.g. v0.1.0, v0.1.0-alpha.1
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (omit to use tag or csproj)'
        required: false

permissions:
  contents: read
  packages: read     # for restoring KyuzanInc.Turnkey.Sdk from GitHub Packages
  id-token: write    # for OIDC signed provenance (future)

jobs:
  publish:
    runs-on: windows-latest      # net8.0-windows requires Windows runner
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Authenticate GitHub Packages NuGet source
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The `github-kyuzan` source itself (URL included) is already
          # declared in the repo's nuget.config; this step just
          # attaches credentials. `add source` would exit with a
          # duplicate-source error here.
          dotnet nuget update source github-kyuzan \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text
          # Auth-liveness probe: fail loudly on a bad/expired token here
          # rather than letting a cold-cache restore surface it later
          # (or a warm cache hide it entirely).
          curl -sSf -o /dev/null \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://nuget.pkg.github.com/KyuzanInc/download/kyuzaninc.turnkey.sdk/index.json" \
            || { echo "::error::GitHub Packages auth failed for KyuzanInc.Turnkey.Sdk (token scope/expiry/grant?)."; exit 1; }

      - name: Restore (locked)
        shell: bash
        run: dotnet restore peak-sdk-csharp.sln --locked-mode

      - name: Build
        run: dotnet build peak-sdk-csharp.sln --no-restore -c Release

      - name: Test
        shell: bash
        run: dotnet test peak-sdk-csharp.sln --no-build -c Release --filter "Category!=E2E"

      - name: Pack
        run: dotnet pack peak-sdk-csharp.sln --no-build -c Release -o ./artifacts

      - name: Upload .nupkg + .snupkg as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: artifacts/**

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ('${{ env.NUGET_API_KEY }}' -eq '') {
            Write-Host "NUGET_API_KEY secret not configured — skipping push."
            exit 0
          }
          Get-ChildItem ./artifacts -Filter "*.nupkg" | ForEach-Object {
            dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
          Get-ChildItem ./artifacts -Filter "*.snupkg" | ForEach-Object {
            dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
