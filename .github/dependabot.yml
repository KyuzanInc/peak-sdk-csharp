version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # KyuzanInc.Turnkey.Sdk is the external Turnkey port; a bump
      # there ships crypto changes that need a deliberate review pass
      # (see docs/sync-rules.md). Do not auto-bump — the maintainer
      # opens a PR by hand after running the wire-format smoke.
      - dependency-name: "KyuzanInc.Turnkey.Sdk"
    labels:
      - "dependencies"
      - "auto"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
