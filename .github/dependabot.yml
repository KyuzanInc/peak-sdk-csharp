version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # BouncyCastle.Cryptography is pinned exactly in Directory.Packages.props.
      # A bump is a crypto-touching change that requires a fresh Codex
      # multi-round review; do not auto-bump.
      - dependency-name: "BouncyCastle.Cryptography"
    labels:
      - "dependencies"
      - "auto"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
