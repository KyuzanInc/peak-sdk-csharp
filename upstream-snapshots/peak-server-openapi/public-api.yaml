info:
  title: Peak Public API
  description: Peak Public API for Users
  version: "1.0"
  contact: {}
tags: []
servers:
  - url: http://localhost:3000/
    description: Local environment
  - url: https://development.yourapi.com/
    description: Development
  - url: https://production.yourapi.com/
    description: Production
components:
  securitySchemes:
    public-api-project-api-key:
      type: apiKey
      in: header
      name: X-API-Key
      description: Project API Key for authentication
    public-api-access-token:
      scheme: bearer
      bearerFormat: token
      description: Public API Access Token
      type: http
    public-api-turnkey-session-jwt:
      scheme: bearer
      bearerFormat: JWT
      description: Turnkey Session JWT
      type: http
  schemas:
    AccountResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Account ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        userId:
          type: string
          description: User ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        accountSourceId:
          type: string
          description: Account source ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        accountIndex:
          type: number
          description: Account index within the account source
          example: 0
        originProjectId:
          type: string
          description: Origin project ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        displayName:
          type: string
          description: User-defined display name
          example: My Main Account
      required:
        - id
        - userId
        - accountSourceId
        - accountIndex
        - originProjectId
    ListAccountsResponseDto:
      type: object
      properties:
        accounts:
          description: List of accounts
          type: array
          items:
            $ref: "#/components/schemas/AccountResponseDto"
      required:
        - accounts
    Stamp:
      type: object
      properties:
        stampHeaderName:
          type: string
          description: Stamp header name
          example: X-Stamp
        stampHeaderValue:
          type: string
          description: Stamp header value
          example: 
      required:
        - stampHeaderName
        - stampHeaderValue
    SignedRequest:
      type: object
      properties:
        body:
          type: string
          description: Body
          example: '{"organizationId":"c0731898-7908-472a-aaff-373417cdb213"}'
        stamp:
          description: Stamp
          allOf:
            - $ref: "#/components/schemas/Stamp"
        url:
          type: string
          description: URL
          example: https://api.turnkey.com/public/v1/query/whoami
      required:
        - body
        - stamp
        - url
    CreateAccountRequestDto:
      type: object
      properties:
        signedCreateWalletAccountsRequest:
          description: Signed create wallet accounts request. The walletId in
            body.parameters is used to identify the account source.
          allOf:
            - $ref: "#/components/schemas/SignedRequest"
        displayName:
          type: string
          description: User-defined display name
          example: My Account
      required:
        - signedCreateWalletAccountsRequest
    ChainTypeEnum:
      type: string
      description: Chain type
      enum:
        - evm
        - bitcoin
        - solana
        - sui
    BitcoinAddressTypeEnum:
      type: string
      description: Bitcoin address type (only for bitcoin chain)
      enum:
        - p2pkh
        - p2sh
        - p2wpkh
        - p2wsh
        - p2tr
    AccountAddressResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Account address ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        accountId:
          type: string
          description: Account ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        address:
          type: string
          description: Blockchain address
          example: "0x1234567890abcdef1234567890abcdef12345678"
        chainType:
          example: evm
          $ref: "#/components/schemas/ChainTypeEnum"
        bitcoinAddressType:
          example: p2wpkh
          $ref: "#/components/schemas/BitcoinAddressTypeEnum"
      required:
        - id
        - accountId
        - address
        - chainType
    CreateAccountResponseDto:
      type: object
      properties:
        account:
          description: Created account
          allOf:
            - $ref: "#/components/schemas/AccountResponseDto"
        accountAddresses:
          description: Account addresses (EVM, Bitcoin, Solana, Sui)
          type: array
          items:
            $ref: "#/components/schemas/AccountAddressResponseDto"
      required:
        - account
        - accountAddresses
    UpdateAccountDisplayNameRequestDto:
      type: object
      properties:
        accountId:
          type: string
          description: Account ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        displayName:
          type: string
          description: New display name
          example: My Main Account
      required:
        - accountId
        - displayName
    UpdateAccountDisplayNameResponseDto:
      type: object
      properties:
        account:
          description: Updated account
          allOf:
            - $ref: "#/components/schemas/AccountResponseDto"
      required:
        - account
    AccountSourceTypeEnum:
      type: string
      description: Account source type
      enum:
        - recovery-phrase
        - private-key
    AccountSourceCreationMethodEnum:
      type: string
      description: Creation method
      enum:
        - imported
        - created
    AccountSourceResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Account source ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        userId:
          type: string
          description: User ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        originProjectId:
          type: string
          description: Origin project ID
          example: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        sourceType:
          example: recovery-phrase
          $ref: "#/components/schemas/AccountSourceTypeEnum"
        creationMethod:
          example: created
          $ref: "#/components/schemas/AccountSourceCreationMethodEnum"
        turnkeyResourceId:
